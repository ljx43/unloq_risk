<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Go Early Risk SQL Skill</title>
  <style>
    :root { color-scheme: light dark; --bg:#f7f7f4; --fg:#161616; --muted:#666; --line:#d8d8d2; --panel:#fff; --accent:#0b6bcb; }
    @media (prefers-color-scheme: dark) { :root { --bg:#111; --fg:#eee; --muted:#aaa; --line:#333; --panel:#1b1b1b; --accent:#7ab7ff; } }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:24px; border-bottom:1px solid var(--line); background:var(--panel); }
    main { max-width:1100px; margin:0 auto; padding:24px; }
    h1 { margin:0 0 8px; font-size:24px; }
    p { color:var(--muted); line-height:1.5; }
    .box { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; margin:18px 0; }
    input { width:100%; max-width:420px; padding:11px 12px; border:1px solid var(--line); border-radius:6px; font:inherit; }
    button { padding:10px 14px; border:1px solid var(--line); border-radius:6px; background:var(--fg); color:var(--bg); font:inherit; cursor:pointer; }
    button.secondary { background:transparent; color:var(--fg); }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .status { margin-top:12px; color:#b42318; }
    .layout { display:grid; grid-template-columns:260px minmax(0,1fr); gap:18px; }
    nav { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px; align-self:start; position:sticky; top:16px; }
    nav button { display:block; width:100%; text-align:left; margin:4px 0; background:transparent; color:var(--fg); border:0; border-radius:5px; padding:8px; }
    nav button.active { background:rgba(11,107,203,.12); color:var(--accent); }
    pre { white-space:pre-wrap; word-break:break-word; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; overflow:auto; line-height:1.45; }
    .hidden { display:none; }
    .toolbar { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    @media (max-width: 780px) { .layout { grid-template-columns:1fr; } nav { position:static; } }
  </style>
</head>

        </div>
      </div>
      <div class="layout">
        <nav id="files"></nav>
        <pre id="content"></pre>
      </div>
    </section>

    const saltB64 = "gaenozzgTD6ZrYL7rQzMPg==";
    const ivB64 = "9h0git4kzHnoDtb9";
    const iterations = 250000;
    let decrypted = null;
    let currentPath = null;

    function b64ToBytes(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const enc = new TextEncoder();
      const material = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(saltB64), iterations, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function showFile(filePath) {
      currentPath = filePath;
      document.querySelectorAll("nav button").forEach(btn => btn.classList.toggle("active", btn.dataset.path === filePath));
      document.getElementById("fileTitle").textContent = filePath;
      document.getElementById("content").textContent = decrypted.files[filePath];
    }

    function render() {
      document.getElementById("unlock").classList.add("hidden");
      document.getElementById("viewer").classList.remove("hidden");
      document.getElementById("meta").textContent = "Generated: " + decrypted.generatedAt;
      const nav = document.getElementById("files");
      nav.innerHTML = "";
      const paths = Object.keys(decrypted.files).sort();
      for (const filePath of paths) {
        const btn = document.createElement("button");
        btn.textContent = filePath;
        btn.dataset.path = filePath;
        btn.onclick = () => showFile(filePath);
        nav.appendChild(btn);
      }
      showFile(paths[0]);
    }

    async function decrypt() {
      const status = document.getElementById("status");
      status.textContent = "";
      try {
        const password = document.getElementById("password").value;
        if (!password) throw new Error("Enter a password.");
        const key = await deriveKey(password);
        const clear = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBytes(ivB64) }, key, b64ToBytes(encryptedPayload));
        const stream = new Blob([clear]).stream().pipeThrough(new DecompressionStream("gzip"));
        const decompressed = await new Response(stream).arrayBuffer();
        decrypted = JSON.parse(new TextDecoder().decode(decompressed));
        render();
      } catch (err) {
        status.textContent = "Could not decrypt. Check the password.";
      }
    }

    document.getElementById("decrypt").onclick = decrypt;
    document.getElementById("password").addEventListener("keydown", event => { if (event.key === "Enter") decrypt(); });
    document.getElementById("copy").onclick = async () => {
      await navigator.clipboard.writeText(decrypted.files[currentPath]);
    };
    document.getElementById("download").onclick = () => {
      const blob = new Blob([decrypted.files[currentPath]], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = currentPath.split("/").pop();
      a.click();
      URL.revokeObjectURL(a.href);
    };
